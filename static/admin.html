<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPlug Hub — Admin</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { font-family: system-ui, sans-serif; max-width: 960px; margin: 0 auto; padding: 1rem 1.5rem; }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    h2 { font-size: 1.1rem; margin: 1.5rem 0 0.5rem; border-bottom: 1px solid #ddd; padding-bottom: 0.25rem; }
    .token-bar { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
    .token-bar input { flex: 1; padding: 0.4rem 0.6rem; font-size: 0.9rem; border: 1px solid #ccc; border-radius: 4px; }
    .token-bar button { padding: 0.4rem 0.8rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-bottom: 1rem; }
    th, td { text-align: left; padding: 0.4rem 0.5rem; border-bottom: 1px solid #eee; }
    th { background: #f5f5f5; font-weight: 600; }
    .btn { padding: 0.3rem 0.7rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .btn-danger { background: #e53e3e; color: white; }
    .btn-primary { background: #3182ce; color: white; }
    .btn-sm { padding: 0.2rem 0.5rem; font-size: 0.8rem; }
    form.add-form { display: grid; gap: 0.5rem; background: #f9f9f9; padding: 1rem; border-radius: 6px; margin-bottom: 1rem; }
    form.add-form label { font-size: 0.85rem; font-weight: 600; }
    form.add-form input, form.add-form select { padding: 0.35rem 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; width: 100%; box-sizing: border-box; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .inline-edit { display: flex; gap: 0.3rem; align-items: center; }
    .inline-edit input { padding: 0.2rem 0.4rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem; flex: 1; }
    .status-ok { color: #276749; font-weight: 600; }
    .status-err { color: #9b2c2c; }
    #status { margin: 0.5rem 0; font-size: 0.85rem; min-height: 1.2em; }
    .outlet-list { font-size: 0.85rem; }
    .outlet-row { display: flex; gap: 0.4rem; align-items: center; margin: 0.2rem 0; }
    .outlet-row span { min-width: 3rem; color: #666; }
    details > summary { cursor: pointer; font-size: 0.85rem; color: #3182ce; }
    [data-hide] { display: none !important; }
    nav a { margin-right: 1rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <nav><a href="/">← Dashboard</a></nav>
  <h1>SmartPlug Hub — Admin</h1>

  <div class="token-bar">
    <input type="password" id="tokenInput" placeholder="Admin token" autocomplete="off">
    <button class="btn btn-primary" onclick="saveToken()">Apply</button>
    <button class="btn" onclick="clearToken()" style="background:#eee">Clear</button>
  </div>
  <div id="status"></div>

  <!-- ── Accounts ── -->
  <h2>Accounts</h2>

  <form class="add-form" onsubmit="addAccount(event)">
    <div class="field-row">
      <div>
        <label>Type</label>
        <select name="type" required>
          <option value="kasa">Kasa (TP-Link)</option>
          <option value="miio">MiIO (Xiaomi)</option>
        </select>
      </div>
      <div>
        <label>Label</label>
        <input name="label" placeholder="Home Kasa account" required>
      </div>
    </div>
    <div class="field-row">
      <div>
        <label>Username</label>
        <input name="username" type="email" placeholder="user@example.com" required>
      </div>
      <div>
        <label>Password</label>
        <input name="password" type="password" required>
      </div>
    </div>
    <div><button class="btn btn-primary" type="submit">Add Account</button></div>
  </form>

  <table id="accountsTable">
    <thead><tr><th>ID</th><th>Type</th><th>Label</th><th>Username</th><th></th></tr></thead>
    <tbody></tbody>
  </table>

  <!-- ── Devices ── -->
  <h2>Devices</h2>

  <form class="add-form" onsubmit="addDevice(event)">
    <div class="field-row">
      <div>
        <label>Type</label>
        <select name="type" id="deviceTypeSelect" onchange="onTypeChange(this.value)" required>
          <option value="kasa">Kasa</option>
          <option value="miio">MiIO</option>
        </select>
      </div>
      <div>
        <label>MAC address</label>
        <input name="mac" placeholder="AA:BB:CC:DD:EE:FF" required>
      </div>
    </div>
    <div class="field-row">
      <div>
        <label>Name</label>
        <input name="name" placeholder="Living room strip" required>
      </div>
      <div>
        <label>Broadcast address</label>
        <input name="broadcast" placeholder="192.168.1.255" required>
      </div>
    </div>
    <div class="field-row">
      <div>
        <label>Group (optional)</label>
        <input name="group_name" placeholder="Living room">
      </div>
      <div>
        <label>Account (optional)</label>
        <select name="account_id" id="accountSelect">
          <option value="">— No account —</option>
        </select>
      </div>
    </div>
    <div id="miioFields" data-hide>
      <div class="field-row">
        <div>
          <label>MiIO Token</label>
          <input name="token" placeholder="32-char hex">
        </div>
        <div>
          <label>MiIO Device ID</label>
          <input name="miio_id" placeholder="123456789">
        </div>
      </div>
    </div>
    <div><button class="btn btn-primary" type="submit">Add Device</button></div>
  </form>

  <table id="devicesTable">
    <thead>
      <tr><th>Name</th><th>Type</th><th>MAC</th><th>Group</th><th>Last IP</th><th>Outlets</th><th></th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="/static/admin.js"></script>
</body>
</html>
