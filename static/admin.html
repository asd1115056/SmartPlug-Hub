<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPlug Hub — Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    /* Login */
    #loginView {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card { width: 360px; }

    /* Admin topbar */
    #adminView { display: none; }

    /* Inline rename input */
    .inline-input { width: 140px; }

    /* Outlet rows inside accordion */
    .outlet-row { display: flex; align-items: center; gap: 0.4rem; padding: 0.3rem 0; }
    .outlet-id  { font-size: 0.8rem; color: #6c757d; min-width: 2.5rem; font-family: monospace; }

    /* Flash toast positioning handled by Bootstrap toast-container */
  </style>
</head>
<body>

<!-- ══ Login ══ -->
<div id="loginView">
  <div class="login-card card shadow">
    <div class="card-body p-4">
      <h5 class="card-title mb-1">SmartPlug Hub</h5>
      <p class="text-muted small mb-4">Admin panel — enter your token to continue.</p>

      <label class="form-label fw-semibold small" for="tokenInput">Admin Token</label>
      <input id="tokenInput" type="password" class="form-control mb-2" placeholder="••••••••" autocomplete="current-password">
      <div id="loginErr" class="text-danger small mb-3" style="min-height:1.2em"></div>
      <button id="loginBtn" class="btn btn-primary w-100" onclick="doLogin()">
        <i class="bi bi-box-arrow-in-right me-1"></i>Sign in
      </button>
    </div>
  </div>
</div>

<!-- ══ Admin ══ -->
<div id="adminView">
  <!-- Topbar -->
  <nav class="navbar navbar-expand navbar-dark bg-dark border-bottom border-secondary px-3">
    <span class="navbar-brand mb-0 h6">SmartPlug Hub — Admin</span>
    <div class="ms-auto d-flex align-items-center gap-2">
      <a href="/" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-house me-1"></i>Dashboard
      </a>
      <button class="btn btn-sm btn-outline-secondary" onclick="doLogout()">
        <i class="bi bi-box-arrow-right me-1"></i>Sign out
      </button>
    </div>
  </nav>

  <div class="container py-4">

    <!-- Accounts -->
    <h5 class="mb-3"><i class="bi bi-person-badge me-2"></i>Accounts</h5>

    <div class="card mb-3">
      <div class="card-body">
        <form onsubmit="addAccount(event)" class="row g-2 align-items-end">
          <div class="col-sm-2">
            <label class="form-label small fw-semibold">Type</label>
            <select name="type" class="form-select form-select-sm" required>
              <option value="kasa">Kasa</option>
              <option value="miio">MiIO</option>
            </select>
          </div>
          <div class="col-sm-3">
            <label class="form-label small fw-semibold">Label</label>
            <input name="label" class="form-control form-control-sm" placeholder="Home Kasa" required>
          </div>
          <div class="col-sm-3">
            <label class="form-label small fw-semibold">Username</label>
            <input name="username" type="email" class="form-control form-control-sm" placeholder="user@example.com" required>
          </div>
          <div class="col-sm-2">
            <label class="form-label small fw-semibold">Password</label>
            <input name="password" type="password" class="form-control form-control-sm" required>
          </div>
          <div class="col-sm-2">
            <button class="btn btn-primary btn-sm w-100" type="submit">
              <i class="bi bi-plus-lg me-1"></i>Add
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="card mb-4">
      <div class="table-responsive">
        <table class="table table-sm table-hover mb-0" id="accountsTable">
          <thead class="table-dark">
            <tr><th>ID</th><th>Type</th><th>Label</th><th>Username</th><th></th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Devices -->
    <h5 class="mb-3"><i class="bi bi-plug me-2"></i>Devices</h5>

    <div class="card mb-3">
      <div class="card-body">
        <form onsubmit="addDevice(event)" class="row g-2 align-items-end">
          <div class="col-sm-2">
            <label class="form-label small fw-semibold">Type</label>
            <select name="type" id="deviceTypeSelect" class="form-select form-select-sm" onchange="onTypeChange(this.value)" required>
              <option value="kasa">Kasa</option>
              <option value="miio">MiIO</option>
            </select>
          </div>
          <div class="col-sm-2">
            <label class="form-label small fw-semibold">MAC</label>
            <input name="mac" class="form-control form-control-sm" placeholder="AA:BB:CC:DD:EE:FF" required>
          </div>
          <div class="col-sm-2">
            <label class="form-label small fw-semibold">Name</label>
            <input name="name" class="form-control form-control-sm" placeholder="Living room strip" required>
          </div>
          <div class="col-sm-2">
            <label class="form-label small fw-semibold">Broadcast</label>
            <input name="broadcast" class="form-control form-control-sm" placeholder="192.168.1.255" required>
          </div>
          <div class="col-sm-2">
            <label class="form-label small fw-semibold">Group</label>
            <input name="group_name" class="form-control form-control-sm" placeholder="optional">
          </div>
          <div class="col-sm-2">
            <label class="form-label small fw-semibold">Account</label>
            <select name="account_id" id="accountSelect" class="form-select form-select-sm">
              <option value="">— none —</option>
            </select>
          </div>
          <!-- MiIO-only fields -->
          <div id="miioFields" class="col-12 row g-2" hidden>
            <div class="col-sm-4">
              <label class="form-label small fw-semibold">MiIO Token</label>
              <input name="token" class="form-control form-control-sm" placeholder="32-char hex">
            </div>
            <div class="col-sm-4">
              <label class="form-label small fw-semibold">MiIO Device ID</label>
              <input name="miio_id" class="form-control form-control-sm" placeholder="123456789">
            </div>
          </div>
          <div class="col-12">
            <button class="btn btn-primary btn-sm" type="submit">
              <i class="bi bi-plus-lg me-1"></i>Add Device
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="table-responsive">
        <table class="table table-sm table-hover mb-0" id="devicesTable">
          <thead class="table-dark">
            <tr><th>Name</th><th>Type</th><th>MAC</th><th>Group</th><th>Last IP</th><th>Outlets</th><th></th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

  </div><!-- /container -->
</div><!-- /adminView -->

<!-- Flash toast -->
<div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/admin.js"></script>
</body>
</html>
